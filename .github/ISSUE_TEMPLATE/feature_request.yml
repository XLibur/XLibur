name: Feature Request
description: Suggest a new feature or enhancement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe what you'd like and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is this related to a frustration with the current API?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the API or behavior you'd like to see.
      value: |
        ```csharp
        // Example of how the API could look
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area of XLibur does this relate to?
      options:
        - Worksheets / Cells
        - Styles / Formatting
        - Formulas / Calculation
        - Tables
        - Pivot Tables
        - Charts
        - Conditional Formatting
        - Data Validation
        - Page Setup / Printing
        - Performance
        - Reading / Parsing
        - Writing / Saving
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or sample files.
    validations:
      required: false
