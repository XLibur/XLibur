name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.

        **Please note:** There is no guarantee or timeline for resolving issues. This is a community-driven project and maintainers work on it in their spare time. Community members are more than welcome to submit PRs to resolve issues (preferably with covering unit tests).

        **Issues without a reproducible test case will be given low priority** unless a community member decides to tackle them. The best way to get a bug fixed quickly is to submit a PR with a failing test and a fix.

  - type: input
    id: version
    attributes:
      label: XLibur Version
      description: Which version of XLibur are you using? (check your .csproj or NuGet package manager)
      placeholder: e.g. 0.105.0
    validations:
      required: true

  - type: dropdown
    id: target-framework
    attributes:
      label: Target Framework
      description: Which .NET target framework are you using?
      options:
        - .NET 8
        - .NET 9
        - .NET 10
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform / OS
      description: Which operating system are you running on?
      options:
        - Windows
        - Linux
        - macOS
        - Docker / Container
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproducible Test Case
      description: |
        Please provide a self-contained NUnit test that reproduces the issue.

        Ideally, the test should **not** depend on an external .xlsx file — create the workbook in code so anyone can run the test immediately. If the bug can only be reproduced with a specific .xlsx file, attach it below and write a test that loads it.

        A good repro test is the single most helpful thing you can provide. It makes it easy for maintainers or community members to verify the fix with a passing test.
      value: |
        ```csharp
        [Test]
        public void ReproduceIssue()
        {
            using var wb = new XLWorkbook();
            var ws = wb.AddWorksheet("Sheet1");

            // Arrange: set up the scenario

            // Act: perform the operation that triggers the bug

            // Assert: what should have happened
            // Assert.That(actual, Is.EqualTo(expected));
        }
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include any exception messages and full stack traces.
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: If you found a workaround, please share it here.
    validations:
      required: false

  - type: textarea
    id: sample-file
    attributes:
      label: Sample File
      description: |
        If the issue requires a specific .xlsx file to reproduce, attach it here by dragging and dropping.
        Please only attach a file if the bug cannot be reproduced by creating the workbook in code.
    validations:
      required: false

  - type: checkboxes
    id: pr-interest
    attributes:
      label: Willing to contribute a fix?
      description: Would you be interested in submitting a PR to fix this issue?
      options:
        - label: I would be willing to submit a PR to fix this issue
          required: false
