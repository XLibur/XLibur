name: Release Drafter

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-release-draft:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
