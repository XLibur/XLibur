name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Set up JDK 17
        if: env.SONAR_TOKEN != ''
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache SonarCloud packages
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@v5
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarCloud scanner
        if: env.SONAR_TOKEN != ''
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore XLibur.slnx

      - name: Check formatting
        run: dotnet format XLibur.slnx --verify-no-changes --verbosity diagnostic

      - name: Check vulnerable packages
        run: |
          OUTPUT=$(dotnet list XLibur.slnx package --vulnerable --include-transitive --format json)
          echo "$OUTPUT"
          if echo "$OUTPUT" | jq -e '.projects[] | select(.frameworks)' > /dev/null 2>&1; then
            echo "::error::Vulnerable packages detected"
            exit 1
          fi

      - name: Begin SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        run: >
          dotnet sonarscanner begin
          /k:"XLibur_XLibur"
          /o:"xlibur"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
          /d:sonar.coverage.exclusions="XLibur.Examples/**,XLibur.Benchmarks/**"

      - name: Build
        run: dotnet build XLibur.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test XLibur.Tests/XLibur.Tests.csproj
          --configuration Release
          --no-build
          --framework net10.0
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: XLibur.Tests/TestResults/*.trx
